<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المستخدمين - نماء أدمن</title>
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🌸</div>
        <h1 class="sidebar-title">نماء</h1>
        <p class="sidebar-subtitle">لوحة الأدمن</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">الرئيسية</span>
        </a>
        <a href="activities.html" class="nav-item">
          <span class="nav-icon">🎮</span>
          <span class="nav-text">الأنشطة</span>
        </a>
        <a href="categories.html" class="nav-item">
          <span class="nav-icon">📁</span>
          <span class="nav-text">الفئات</span>
        </a>
        <a href="users.html" class="nav-item active">
          <span class="nav-icon">👥</span>
          <span class="nav-text">المستخدمين</span>
        </a>
        <a href="children.html" class="nav-item">
          <span class="nav-icon">👶</span>
          <span class="nav-text">الأطفال</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <p>الإصدار 1.0.0</p>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">المستخدمين</h1>
          <p class="page-subtitle">جميع المستخدمين المسجلين في النظام</p>
        </div>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon sky">👥</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">إجمالي المستخدمين</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">👨‍👩</div>
          <div class="stat-info">
            <div class="stat-value" id="statParents">0</div>
            <div class="stat-label">أولياء الأمور</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">👨‍⚕️</div>
          <div class="stat-info">
            <div class="stat-value" id="statSpecialists">0</div>
            <div class="stat-label">الأخصائيين</div>
          </div>
        </div>
      </div>

      <!-- Users List -->
      <div class="card">
        <h2 class="card-title">📋 قائمة المستخدمين</h2>

        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="بحث بالاسم أو البريد..." />
          </div>
          <select id="filterRole" class="filter-select">
            <option value="">جميع الأدوار</option>
            <option value="parent">ولي أمر</option>
            <option value="specialist">أخصائي</option>
          </select>
        </div>

        <div id="usersList">
          <div class="loading-state">جاري التحميل...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import {
      db,
      collection,
      onSnapshot,
      escapeHtml,
      formatDate,
    } from "./assets/firebase.js";

    let allUsers = [];

    function getRoleInfo(role) {
      if (role === "parent") return { name: "ولي أمر", badge: "badge-parent" };
      if (role === "specialist") return { name: "أخصائي", badge: "badge-specialist" };
      return { name: "—", badge: "badge-default" };
    }

    function renderList() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const roleFilter = document.getElementById("filterRole").value;
      const list = document.getElementById("usersList");

      let filtered = allUsers;
      if (roleFilter) filtered = filtered.filter((u) => u.role === roleFilter);
      if (search) {
        filtered = filtered.filter((u) =>
          (u.name || "").toLowerCase().includes(search) ||
          (u.email || "").toLowerCase().includes(search)
        );
      }

      if (filtered.length === 0) {
        const isEmpty = allUsers.length === 0;
        list.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">${isEmpty ? "👤" : "🔍"}</span>
            <div class="empty-title">${isEmpty ? "لا يوجد مستخدمين بعد" : "لا توجد نتائج"}</div>
            <div class="empty-sub">${isEmpty ? "سيظهر المستخدمين هنا عند تسجيلهم" : "جرّبي تغيير البحث أو الفلتر"}</div>
          </div>
        `;
        return;
      }

      list.innerHTML = '<div class="item-list">' + filtered.map((u) => {
        const initial = (u.name || "؟").charAt(0).toUpperCase();
        const roleInfo = getRoleInfo(u.role);
        const created = u.createdAt ? formatDate(u.createdAt) : "—";

        return `
          <div class="list-item">
            <div style="width:48px; height:48px; background: var(--sky-light); color: var(--sky-dark); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; flex-shrink: 0;">${escapeHtml(initial)}</div>
            <div class="item-info">
              <div class="item-title">${escapeHtml(u.name || "بدون اسم")}</div>
              <div class="item-meta">
                <span class="badge ${roleInfo.badge}">${roleInfo.name}</span>
                <span>📧 ${escapeHtml(u.email || "—")}</span>
                <span>📅 ${created}</span>
              </div>
            </div>
          </div>
        `;
      }).join("") + '</div>';
    }

    onSnapshot(collection(db, "Users"), (snap) => {
      allUsers = [];
      let parents = 0, specialists = 0;
      snap.forEach((d) => {
        const data = { id: d.id, ...d.data() };
        allUsers.push(data);
        if (data.role === "parent") parents++;
        else if (data.role === "specialist") specialists++;
      });

      allUsers.sort((a, b) => {
        const timeA = a.createdAt?.toMillis?.() || 0;
        const timeB = b.createdAt?.toMillis?.() || 0;
        return timeB - timeA;
      });

      document.getElementById("statTotal").textContent = allUsers.length;
      document.getElementById("statParents").textContent = parents;
      document.getElementById("statSpecialists").textContent = specialists;

      renderList();
    });

    document.getElementById("searchInput").addEventListener("input", renderList);
    document.getElementById("filterRole").addEventListener("change", renderList);
  </script>
</body>
</html>
