<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الفئات - نماء</title>
  <link rel="stylesheet" href="assets/admin.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="32" cy="18" rx="7" ry="9" fill="white" opacity="0.95"/>
            <ellipse cx="20" cy="26" rx="7" ry="9" fill="white" opacity="0.85" transform="rotate(-50 20 26)"/>
            <ellipse cx="44" cy="26" rx="7" ry="9" fill="white" opacity="0.85" transform="rotate(50 44 26)"/>
            <ellipse cx="22" cy="38" rx="7" ry="9" fill="white" opacity="0.75" transform="rotate(-110 22 38)"/>
            <ellipse cx="42" cy="38" rx="7" ry="9" fill="white" opacity="0.75" transform="rotate(110 42 38)"/>
            <circle cx="32" cy="30" r="6" fill="#FFD54F"/>
            <circle cx="32" cy="30" r="3" fill="#FF9800"/>
            <path d="M 32 36 Q 32 46 32 54" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
            <path d="M 32 46 Q 24 44 22 50 Q 28 50 32 48 Z" fill="white" opacity="0.7"/>
          </svg>
        </div>
        <h1 class="sidebar-title">نماء</h1>
        <p class="sidebar-subtitle">صفحة المسؤول</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <span class="nav-icon"><i data-lucide="home"></i></span>
          <span class="nav-text">الرئيسية</span>
        </a>
        <a href="activities.html" class="nav-item">
          <span class="nav-icon"><i data-lucide="puzzle"></i></span>
          <span class="nav-text">الأنشطة</span>
        </a>
        <a href="categories.html" class="nav-item active">
          <span class="nav-icon"><i data-lucide="layout-grid"></i></span>
          <span class="nav-text">الفئات</span>
        </a>
        <a href="users.html" class="nav-item">
          <span class="nav-icon"><i data-lucide="users"></i></span>
          <span class="nav-text">المستخدمين</span>
        </a>
        <a href="children.html" class="nav-item">
          <span class="nav-icon"><i data-lucide="baby"></i></span>
          <span class="nav-text">الأطفال</span>
        </a>
      </nav>
      <div class="sidebar-user-info">
        <div class="sidebar-user-avatar" id="sidebarAvatarLetter">م</div>
        <div class="sidebar-user-text">
          <div class="sidebar-user-name" id="sidebarAdminName">جاري التحميل...</div>
          <div class="sidebar-user-email" id="sidebarAdminEmail">—</div>
        </div>
      </div>

      <div style="padding: 0 12px 12px;">
        <button type="button" class="sidebar-logout-btn" onclick="window.handleLogout()">
          <i data-lucide="log-out"></i>
          <span class="logout-text">تسجيل الخروج</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <p>الإصدار 1.0.0</p>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">
            <i data-lucide="layout-grid" style="color: var(--sky-dark);"></i>
            الفئات
          </h1>
          <p class="page-subtitle">الفئات الأساسية للأنشطة في تطبيق نماء</p>
        </div>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Categories Grid -->
      <div class="card">
        <h2 class="card-title">
          <i data-lucide="layers"></i>
          الفئات الأربع الرئيسية
        </h2>
        <p style="color: var(--muted); font-size: 13px; margin-bottom: 20px;">
          هذه الفئات ثابتة في النظام. كل نشاط يجب أن ينتمي لإحدى هذه الفئات.
        </p>

        <div id="categoriesGrid" class="stats-grid" style="margin-bottom: 0;">
          <div class="loading-state">جاري التحميل...</div>
        </div>
      </div>

      <!-- Activities by Category -->
      <div class="card">
        <h2 class="card-title">
          <i data-lucide="bar-chart-3"></i>
          الأنشطة حسب الفئة
        </h2>
        <div id="activitiesByCategory">
          <div class="loading-state">جاري التحميل...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { adminReady } from "./assets/auth-guard.js";
    import {
      db,
      collection,
      onSnapshot,
      CATEGORY_MAP,
      escapeHtml,
      logoutAdmin,
    } from "./assets/firebase.js";

    window.handleLogout = logoutAdmin;

    adminReady.then((admin) => {
      const initial = (admin.name || "م").charAt(0).toUpperCase();
      const avatarEl = document.getElementById("sidebarAvatarLetter");
      if (avatarEl) avatarEl.textContent = initial;
    });

    function refreshIcons() {
      if (typeof lucide !== "undefined") lucide.createIcons();
    }

    onSnapshot(collection(db, "Activities"), (snap) => {
      const activities = [];
      const counts = { memoryCategoryID: 0, focusCategoryID: 0, thinkingCategoryID: 0, perceptionCategoryID: 0 };
      const byCategory = { memoryCategoryID: [], focusCategoryID: [], thinkingCategoryID: [], perceptionCategoryID: [] };

      snap.forEach((d) => {
        const data = { id: d.id, ...d.data() };
        activities.push(data);
        if (counts[data.categoryId] !== undefined) {
          counts[data.categoryId]++;
          byCategory[data.categoryId].push(data);
        }
      });

      const grid = document.getElementById("categoriesGrid");
      const colorClasses = {
        memoryCategoryID: "purple",
        focusCategoryID: "amber",
        thinkingCategoryID: "blue",
        perceptionCategoryID: "pink",
      };

      grid.innerHTML = Object.keys(CATEGORY_MAP).map((catId) => {
        const cat = CATEGORY_MAP[catId];
        const count = counts[catId] || 0;
        return `
          <div class="stat-card">
            <div class="stat-icon ${colorClasses[catId]}"><i data-lucide="${cat.lucideIcon}"></i></div>
            <div class="stat-info">
              <div class="stat-value">${count}</div>
              <div class="stat-label">${cat.name}</div>
            </div>
          </div>
        `;
      }).join("");

      const container = document.getElementById("activitiesByCategory");
      if (activities.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon"><i data-lucide="inbox"></i></span>
            <div class="empty-title">لا توجد أنشطة بعد</div>
            <div class="empty-sub">أضيفي أنشطة من صفحة الأنشطة</div>
          </div>
        `;
        refreshIcons();
        return;
      }

      container.innerHTML = Object.keys(CATEGORY_MAP).map((catId) => {
        const cat = CATEGORY_MAP[catId];
        const items = byCategory[catId] || [];

        return `
          <div style="margin-bottom: 24px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid ${cat.color}33;">
              <div class="item-emoji ${cat.iconClass}" style="width: 36px; height: 36px;">
                <i data-lucide="${cat.lucideIcon}"></i>
              </div>
              <h3 style="font-size: 15px; font-weight: 700; color: var(--text);">${cat.name}</h3>
              <span class="badge ${cat.badge}" style="margin-right: auto;">${items.length} نشاط</span>
            </div>

            ${items.length === 0
              ? '<p style="color: var(--muted); font-size: 13px; padding: 8px 0;">لا توجد أنشطة في هذه الفئة</p>'
              : '<div class="item-list">' + items.map((act) => `
                  <div class="list-item">
                    <div class="item-info">
                      <div class="item-title">${escapeHtml(act.title || "بدون عنوان")}</div>
                      <div class="item-meta">
                        <span>${act.levels || 0} مستويات</span>
                      </div>
                    </div>
                  </div>
                `).join("") + '</div>'
            }
          </div>
        `;
      }).join("");
      refreshIcons();
    });

    refreshIcons();
  </script>
</body>
</html>
