<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأطفال - نماء أدمن</title>
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">🌸</div>
        <h1 class="sidebar-title">نماء</h1>
        <p class="sidebar-subtitle">لوحة الأدمن</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">الرئيسية</span>
        </a>
        <a href="activities.html" class="nav-item">
          <span class="nav-icon">🎮</span>
          <span class="nav-text">الأنشطة</span>
        </a>
        <a href="categories.html" class="nav-item">
          <span class="nav-icon">📁</span>
          <span class="nav-text">الفئات</span>
        </a>
        <a href="users.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">المستخدمين</span>
        </a>
        <a href="children.html" class="nav-item active">
          <span class="nav-icon">👶</span>
          <span class="nav-text">الأطفال</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <p>الإصدار 1.0.0</p>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">الأطفال</h1>
          <p class="page-subtitle">جميع الأطفال المسجلين في النظام</p>
        </div>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon pink">👶</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">إجمالي الأطفال</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">♂️</div>
          <div class="stat-info">
            <div class="stat-value" id="statBoys">0</div>
            <div class="stat-label">أولاد</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon pink">♀️</div>
          <div class="stat-info">
            <div class="stat-value" id="statGirls">0</div>
            <div class="stat-label">بنات</div>
          </div>
        </div>
      </div>

      <!-- Children List -->
      <div class="card">
        <h2 class="card-title">📋 قائمة الأطفال</h2>

        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="بحث بالاسم أو إيميل ولي الأمر..." />
          </div>
          <select id="filterSpecialist" class="filter-select">
            <option value="">جميع الأخصائيين</option>
          </select>
        </div>

        <div id="childrenList">
          <div class="loading-state">جاري التحميل...</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import {
      db,
      collection,
      onSnapshot,
      escapeHtml,
      formatDate,
      calculateAge,
    } from "./assets/firebase.js";

    let allChildren = [];
    let specialistsMap = {};

    function genderInfo(gender) {
      if (gender === "male" || gender === "ذكر") return { icon: "👦", label: "ولد" };
      if (gender === "female" || gender === "أنثى") return { icon: "👧", label: "بنت" };
      return { icon: "👶", label: "—" };
    }

    function renderList() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const specialistFilter = document.getElementById("filterSpecialist").value;
      const list = document.getElementById("childrenList");

      let filtered = allChildren;
      if (specialistFilter) filtered = filtered.filter((c) => c.specialistId === specialistFilter);
      if (search) {
        filtered = filtered.filter((c) =>
          (c.name || "").toLowerCase().includes(search) ||
          (c.parentEmail || "").toLowerCase().includes(search)
        );
      }

      if (filtered.length === 0) {
        const isEmpty = allChildren.length === 0;
        list.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">${isEmpty ? "👶" : "🔍"}</span>
            <div class="empty-title">${isEmpty ? "لا يوجد أطفال بعد" : "لا توجد نتائج"}</div>
            <div class="empty-sub">${isEmpty ? "يضيف الأخصائيون الأطفال من تطبيق نماء" : "جرّبي تغيير البحث أو الفلتر"}</div>
          </div>
        `;
        return;
      }

      list.innerHTML = '<div class="item-list">' + filtered.map((c) => {
        const gen = genderInfo(c.gender);
        const age = calculateAge(c.birthDate);
        const specialistName = specialistsMap[c.specialistId] || "غير محدد";
        const created = c.createdAt ? formatDate(c.createdAt) : "—";

        return `
          <div class="list-item">
            <div style="font-size: 36px; flex-shrink: 0;">${gen.icon}</div>
            <div class="item-info">
              <div class="item-title">${escapeHtml(c.name || "بدون اسم")}</div>
              <div class="item-meta" style="flex-wrap: wrap;">
                <span>👤 ${gen.label}</span>
                <span>🎂 ${age} ${typeof age === "number" ? "سنوات" : ""}</span>
                <span>📧 ${escapeHtml(c.parentEmail || "—")}</span>
                <span class="badge badge-specialist">د. ${escapeHtml(specialistName)}</span>
                ${c.difficulty ? `<span>📝 ${escapeHtml(c.difficulty)}</span>` : ""}
                <span>📅 ${created}</span>
              </div>
            </div>
          </div>
        `;
      }).join("") + '</div>';
    }

    function updateSpecialistFilter() {
      const select = document.getElementById("filterSpecialist");
      const currentValue = select.value;

      const usedSpecialists = new Set(allChildren.map((c) => c.specialistId).filter(Boolean));

      let options = '<option value="">جميع الأخصائيين</option>';
      usedSpecialists.forEach((uid) => {
        const name = specialistsMap[uid] || "غير محدد";
        options += `<option value="${escapeHtml(uid)}">${escapeHtml(name)}</option>`;
      });
      select.innerHTML = options;
      select.value = currentValue;
    }

    // Specialists map
    onSnapshot(collection(db, "Users"), (snap) => {
      specialistsMap = {};
      snap.forEach((d) => {
        const data = d.data();
        if (data.role === "specialist") {
          specialistsMap[d.id] = data.name || "—";
        }
      });
      updateSpecialistFilter();
      renderList();
    });

    // Children
    onSnapshot(collection(db, "Children"), (snap) => {
      allChildren = [];
      let boys = 0, girls = 0;
      snap.forEach((d) => {
        const data = { id: d.id, ...d.data() };
        allChildren.push(data);
        if (data.gender === "male" || data.gender === "ذكر") boys++;
        else if (data.gender === "female" || data.gender === "أنثى") girls++;
      });

      allChildren.sort((a, b) => {
        const timeA = a.createdAt?.toMillis?.() || 0;
        const timeB = b.createdAt?.toMillis?.() || 0;
        return timeB - timeA;
      });

      document.getElementById("statTotal").textContent = allChildren.length;
      document.getElementById("statBoys").textContent = boys;
      document.getElementById("statGirls").textContent = girls;

      updateSpecialistFilter();
      renderList();
    });

    document.getElementById("searchInput").addEventListener("input", renderList);
    document.getElementById("filterSpecialist").addEventListener("change", renderList);
  </script>
</body>
</html>
